[package]
name = "verifier_exe"
version = "0.1.0"
edition = "2024_07"

[dependencies]
falcon = { path = "../falcon" }
cairo_execute = "2.18.0"

# Two executable targets: the fast-but-undeployable unrolled verifier and the
# deployable looped one. Run with `scarb execute --executable-name <name>`.
[[target.executable]]
name = "verify_unrolled"
function = "verifier_exe::main"

[[target.executable]]
name = "verify_looped"
function = "verifier_exe::main_looped"

# Self-contained: hashes (nonce||pk||msg) on-chain via interoperable SHAKE-256,
# then verifies. Measures the true standard-Falcon cost (hash dominates).
[[target.executable]]
name = "verify_full_shake"
function = "verifier_exe::main_full_shake"

[cairo]
enable-gas = false
